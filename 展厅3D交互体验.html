<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黑芝麻智能 · 机器人场景展馆 · 3D交互体验</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
canvas { display: block; }

#hud {
    position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 100;
}

#title-bar {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 100; pointer-events: none;
}
#title-bar h1 {
    font-size: 22px; font-weight: 900; color: #fff;
    text-shadow: 0 0 20px rgba(0,212,255,0.8);
    letter-spacing: 3px;
}
#title-bar .sub {
    font-size: 13px; color: rgba(0,212,255,0.6);
    letter-spacing: 6px; margin-top: 4px;
}

#controls-hint {
    position: fixed; bottom: 20px; left: 20px;
    background: rgba(0,0,0,0.7); border: 1px solid rgba(0,212,255,0.3);
    border-radius: 10px; padding: 15px 20px; z-index: 100;
    backdrop-filter: blur(10px); font-size: 13px; color: rgba(255,255,255,0.7);
    line-height: 2;
}
#controls-hint .key {
    display: inline-block; background: rgba(0,212,255,0.2);
    border: 1px solid rgba(0,212,255,0.4); border-radius: 4px;
    padding: 2px 8px; margin: 0 3px; font-family: monospace;
    color: #00d4ff; font-size: 12px;
}

#mode-toggle {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; gap: 10px; z-index: 100;
}
#mode-toggle button {
    background: rgba(0,30,60,0.8); border: 1px solid rgba(0,212,255,0.4);
    color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer;
    font-size: 13px; transition: all 0.3s; backdrop-filter: blur(10px);
}
#mode-toggle button:hover { background: rgba(0,212,255,0.3); }
#mode-toggle button.active { background: rgba(0,212,255,0.5); border-color: #00d4ff; }

#info-panel {
    position: fixed; top: 50%; right: -400px;
    transform: translateY(-50%);
    width: 360px; background: rgba(0,10,30,0.95);
    border: 1px solid rgba(0,212,255,0.4); border-radius: 16px;
    padding: 30px; z-index: 200; backdrop-filter: blur(20px);
    transition: right 0.5s ease; color: #fff;
}
#info-panel.show { right: 20px; }
#info-panel h2 {
    font-size: 24px; color: #00d4ff; margin-bottom: 10px;
}
#info-panel .tag {
    font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 15px;
    letter-spacing: 3px;
}
#info-panel p {
    font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.8; margin-bottom: 15px;
}
#info-panel .specs {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px;
}
#info-panel .spec {
    background: rgba(0,212,255,0.08); border-radius: 8px; padding: 10px;
    font-size: 12px;
}
#info-panel .spec-label { color: rgba(255,255,255,0.4); font-size: 11px; }
#info-panel .spec-value { color: #00d4ff; font-weight: 700; margin-top: 3px; }
#info-panel .close-btn {
    position: absolute; top: 15px; right: 15px;
    background: none; border: none; color: rgba(255,255,255,0.4);
    font-size: 24px; cursor: pointer;
}
#info-panel .close-btn:hover { color: #fff; }

#loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; display: flex; align-items: center; justify-content: center;
    z-index: 1000; flex-direction: column;
}
#loading .spinner {
    width: 60px; height: 60px; border: 3px solid rgba(0,212,255,0.2);
    border-top-color: #00d4ff; border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading .text {
    margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 4px;
}

#crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 20px; height: 20px; z-index: 50; pointer-events: none;
    display: none;
}
#crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(0,212,255,0.5);
}
#crosshair::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
#crosshair::after { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }
</style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div class="text">加载3D展厅中...</div>
</div>

<div id="title-bar">
    <h1>🤖 黑芝麻智能 · 机器人星球</h1>
    <div class="sub">BLACK SESAME · ROBOT PLANET · 3D EXPERIENCE</div>
</div>

<div id="controls-hint">
    <div><span class="key">拖拽</span> 旋转视角　<span class="key">滚轮</span> 缩放</div>
    <div><span class="key">点击</span> 展开详情　<span class="key">WASD</span> 第一人称行走</div>
</div>

<div id="mode-toggle">
    <button id="btn-orbit" class="active">🖱️ 环绕模式</button>
    <button id="btn-walk">🚶 漫游模式</button>
</div>

<div id="crosshair"></div>

<div id="info-panel">
    <button class="close-btn" onclick="closePanel()">×</button>
    <h2 id="info-title">展品名称</h2>
    <div class="tag" id="info-tag">CATEGORY</div>
    <p id="info-desc">描述</p>
    <div class="specs" id="info-specs"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============ Scene Setup ============
let scene, camera, renderer, orbitControls, pointerControls;
let raycaster, mouse;
let interactables = [];
let mode = 'orbit';
let clock;

function init() {
    // Scene
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000010, 0.015);
    scene.background = new THREE.Color(0x000005);

    // Camera
    camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 25);

    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();
    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    // Controls
    setupControls();

    // Build scene
    createRoom();
    createHexCore();
    createRobots();
    createCentralScreen();
    createDecorWall();
    createSymbiosisZone();
    createLighting();
    createParticles();
    createFloorGrid();

    // Events
    window.addEventListener('resize', onResize);
    renderer.domElement.addEventListener('click', onClick);
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);

    // Hide loading
    document.getElementById('loading').style.display = 'none';

    animate();
}

// ============ Controls ============
function setupControls() {
    orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.05;
    orbitControls.minDistance = 5;
    orbitControls.maxDistance = 60;
    orbitControls.maxPolarAngle = Math.PI / 2 - 0.05;
    orbitControls.target.set(0, 2, 0);

    pointerControls = new THREE.PointerLockControls(camera, renderer.domElement);
}

let walkMode = false;
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();

function setMode(m) {
    mode = m;
    if (m === 'walk') {
        orbitControls.enabled = false;
        camera.position.set(0, 3, 15);
        document.getElementById('crosshair').style.display = 'block';
        document.getElementById('btn-walk').classList.add('active');
        document.getElementById('btn-orbit').classList.remove('active');
        // Request pointer lock on next click
        renderer.domElement.addEventListener('click', requestLock);
    } else {
        orbitControls.enabled = true;
        pointerControls.unlock();
        camera.position.set(0, 15, 25);
        document.getElementById('crosshair').style.display = 'none';
        document.getElementById('btn-orbit').classList.add('active');
        document.getElementById('btn-walk').classList.remove('active');
        renderer.domElement.removeEventListener('click', requestLock);
    }
}

function requestLock() {
    if (walkMode) pointerControls.lock();
}

// ============ Room ============
function createRoom() {
    const roomSize = 40;
    const roomHeight = 8;

    // Floor
    const floorGeo = new THREE.PlaneGeometry(roomSize, roomSize);
    const floorMat = new THREE.MeshStandardMaterial({
        color: 0x080810, metalness: 0.8, roughness: 0.3
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Floor glow lines
    const lineGeo = new THREE.PlaneGeometry(0.1, roomSize);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0x004466, transparent: true, opacity: 0.5 });
    for (let i = -roomSize/2; i <= roomSize/2; i += 4) {
        const line1 = new THREE.Mesh(lineGeo, lineMat);
        line1.rotation.x = -Math.PI / 2;
        line1.position.set(i, 0.01, 0);
        scene.add(line1);
        const line2 = new THREE.Mesh(lineGeo, lineMat);
        line2.rotation.x = -Math.PI / 2;
        line2.rotation.z = Math.PI / 2;
        line2.position.set(0, 0.01, i);
        scene.add(line2);
    }

    // Ceiling
    const ceilingGeo = new THREE.PlaneGeometry(roomSize, roomSize);
    const ceilingMat = new THREE.MeshStandardMaterial({
        color: 0x05050a, metalness: 0.5, roughness: 0.5
    });
    const ceiling = new THREE.Mesh(ceilingGeo, ceilingMat);
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = roomHeight;
    scene.add(ceiling);

    // Walls
    const wallMat = new THREE.MeshStandardMaterial({
        color: 0x0a0a15, metalness: 0.3, roughness: 0.7
    });
    const walls = [
        { pos: [0, roomHeight/2, -roomSize/2], rot: [0, 0, 0], size: [roomSize, roomHeight] },
        { pos: [0, roomHeight/2, roomSize/2], rot: [0, Math.PI, 0], size: [roomSize, roomHeight] },
        { pos: [-roomSize/2, roomHeight/2, 0], rot: [0, Math.PI/2, 0], size: [roomSize, roomHeight] },
        { pos: [roomSize/2, roomHeight/2, 0], rot: [0, -Math.PI/2, 0], size: [roomSize, roomHeight] }
    ];
    walls.forEach(w => {
        const geo = new THREE.PlaneGeometry(w.size[0], w.size[1]);
        const mesh = new THREE.Mesh(geo, wallMat);
        mesh.position.set(...w.pos);
        mesh.rotation.set(...w.rot);
        scene.add(mesh);

        // Wall glow strips
        for (let y = 1; y < roomHeight; y += 2) {
            const stripGeo = new THREE.PlaneGeometry(w.size[0] * 0.9, 0.05);
            const stripMat = new THREE.MeshBasicMaterial({ color: 0x002244, transparent: true, opacity: 0.6 });
            const strip = new THREE.Mesh(stripGeo, stripMat);
            strip.position.set(w.pos[0], y, w.pos[2]);
            strip.rotation.set(w.rot[0], w.rot[1], w.rot[2]);
            scene.add(strip);
        }
    });
}

// ============ Hex Core (Central Device) ============
let hexCore, hexCoreLight;
function createHexCore() {
    const group = new THREE.Group();

    // Central hexagonal column
    const hexGeo = new THREE.CylinderGeometry(1.5, 1.5, 5, 6);
    const hexMat = new THREE.MeshStandardMaterial({
        color: 0x001525, metalness: 0.9, roughness: 0.1,
        emissive: 0x004466, emissiveIntensity: 0.5
    });
    hexCore = new THREE.Mesh(hexGeo, hexMat);
    hexCore.position.y = 3;
    hexCore.castShadow = true;
    group.add(hexCore);

    // Inner glowing core
    const innerGeo = new THREE.CylinderGeometry(0.6, 0.6, 4.5, 6);
    const innerMat = new THREE.MeshBasicMaterial({
        color: 0x00d4ff, transparent: true, opacity: 0.8
    });
    const innerCore = new THREE.Mesh(innerGeo, innerMat);
    innerCore.position.y = 3;
    group.add(innerCore);

    // Rotating rings around the core
    for (let i = 0; i < 3; i++) {
        const ringGeo = new THREE.TorusGeometry(2 + i * 0.8, 0.05, 8, 32);
        const ringMat = new THREE.MeshBasicMaterial({
            color: i === 0 ? 0x00d4ff : (i === 1 ? 0x0080ff : 0x6644ff),
            transparent: true, opacity: 0.6 - i * 0.15
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.y = 3;
        ring.rotation.x = Math.PI / 2 + (i * 0.3);
        ring.userData.rotSpeed = (i + 1) * 0.3 * (i % 2 === 0 ? 1 : -1);
        group.add(ring);
    }

    // Base platform
    const baseGeo = new THREE.CylinderGeometry(3, 3.5, 0.3, 6);
    const baseMat = new THREE.MeshStandardMaterial({
        color: 0x222233, metalness: 0.8, roughness: 0.2,
        emissive: 0x001122, emissiveIntensity: 0.3
    });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.y = 0.15;
    base.receiveShadow = true;
    group.add(base);

    // Point light from core
    hexCoreLight = new THREE.PointLight(0x00d4ff, 3, 20);
    hexCoreLight.position.y = 4;
    group.add(hexCoreLight);

    group.userData = {
        name: '千万形态塔',
        tag: 'CORE DEVICE · 核心装置',
        desc: '黑芝麻智能展厅的核心视觉装置。3米高环形LED柱，中心是一颗黑芝麻芯片。LED柱环绕显示千万种机器人形态的粒子动画——从芯片核心向外辐射，不断变形为人形、四足、飞行器、机械臂等。这是整个展馆的视觉锚点和拍照打卡点。',
        specs: [
            { label: '高度', value: '3米' },
            { label: '形态', value: '六边形LED柱' },
            { label: '芯片', value: '华山A2000' },
            { label: '动画', value: '千万形态粒子' }
        ]
    };
    group.position.set(0, 0, 0);
    interactables.push(group);
    scene.add(group);
}

// ============ Robots ============
function createRobots() {
    const positions = [
        { x: -12, z: -8, color: 0x00ff99, name: 'Walker S3', tag: 'HUMANOID · 人形机器人',
          desc: '优必选Walker S3人形机器人，展厅的主角。负责迎宾导引、带客参观、人像采集。基于黑芝麻华山A2000芯片驱动，具备多模态交互能力。',
          specs: [{label:'型号',value:'Walker S3'},{label:'品牌',value:'优必选'},{label:'芯片',value:'华山A2000'},{label:'功能',value:'迎宾+讲解'}] },
        { x: -6, z: -12, color: 0x00ccff, name: 'M20 Pro', tag: 'QUADRUPED · 机器狗',
          desc: '云深处M20 Pro机器狗，负责巡检、越障演示、巡场感知。配置3米×2米越障坡道与导航路径，演示爬坡、避障与自主路径规划。',
          specs: [{label:'型号',value:'M20 Pro'},{label:'品牌',value:'云深处'},{label:'功能',value:'巡检+越障'},{label:'平台',value:'SesameX Kalos'}] },
        { x: 6, z: -12, color: 0xff9944, name: '咖啡机器人', tag: 'SERVICE · 服务机器人',
          desc: '咖啡机器人，制作肖像特色咖啡。Walker S3拍下的脸，几分钟后由咖啡机器人做成奶泡上的头像——杯上印着自己，即是认领凭证。',
          specs: [{label:'型号',value:'TBD'},{label:'功能',value:'肖像拉花咖啡'},{label:'亮点',value:'AI专属拉花'},{label:'平台',value:'SesameX Liora'}] },
        { x: 12, z: -8, color: 0x4488ff, name: '云迹送餐', tag: 'LOGISTICS · 物流机器人',
          desc: '云迹送餐机器人，负责送包到会议室、送物服务。基于SesameX Kalos平台，具备自主导航和路径规划能力。',
          specs: [{label:'型号',value:'云迹送餐'},{label:'品牌',value:'云迹'},{label:'功能',value:'送物+送包'},{label:'平台',value:'SesameX Kalos'}] },
        { x: 0, z: 12, color: 0xaa66ff, name: '遨博协作臂', tag: 'MANIPULATOR · 机械臂',
          desc: '遨博协作机械臂，演示动捕数采、家务整理。基于SesameX Aura多模态感知平台，展示机器人精细操作能力。',
          specs: [{label:'型号',value:'遨博协作臂'},{label:'品牌',value:'遨博'},{label:'功能',value:'动捕+操作'},{label:'平台',value:'SesameX Aura'}] },
    ];

    positions.forEach((r, i) => {
        const group = new THREE.Group();

        // Platform
        const platGeo = new THREE.CylinderGeometry(1.5, 1.8, 0.2, 24);
        const platMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a2a, metalness: 0.8, roughness: 0.2,
            emissive: r.color, emissiveIntensity: 0.1
        });
        const platform = new THREE.Mesh(platGeo, platMat);
        platform.position.y = 0.1;
        platform.receiveShadow = true;
        group.add(platform);

        // Robot body (simplified)
        const bodyGeo = new THREE.CylinderGeometry(0.4, 0.5, 2.2, 12);
        const bodyMat = new THREE.MeshStandardMaterial({
            color: 0x999999, metalness: 0.9, roughness: 0.2,
            emissive: r.color, emissiveIntensity: 0.15
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 1.2;
        body.castShadow = true;
        group.add(body);

        // Robot head
        const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({
            color: 0xaaaaaa, metalness: 0.9, roughness: 0.15,
            emissive: r.color, emissiveIntensity: 0.2
        });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 2.2;
        head.castShadow = true;
        group.add(head);

        // Glow ring at base
        const ringGeo = new THREE.TorusGeometry(1.6, 0.05, 8, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: r.color, transparent: true, opacity: 0.6 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.y = 0.05;
        ring.rotation.x = Math.PI / 2;
        group.add(ring);

        // Point light
        const light = new THREE.PointLight(r.color, 1.5, 6);
        light.position.y = 2;
        group.add(light);

        // Floating label
        const labelCanvas = document.createElement('canvas');
        labelCanvas.width = 256; labelCanvas.height = 64;
        const ctx = labelCanvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,20,0.8)';
        ctx.fillRect(0, 0, 256, 64);
        ctx.font = 'bold 28px Microsoft YaHei';
        ctx.fillStyle = '#' + r.color.toString(16).padStart(6, '0');
        ctx.textAlign = 'center';
        ctx.fillText(r.name, 128, 42);
        const labelTex = new THREE.CanvasTexture(labelCanvas);
        const labelMat = new THREE.SpriteMaterial({ map: labelTex, transparent: true });
        const label = new THREE.Sprite(labelMat);
        label.position.y = 3.2;
        label.scale.set(3, 0.75, 1);
        group.add(label);

        group.position.set(r.x, 0, r.z);
        group.userData = { name: r.name, tag: r.tag, desc: r.desc, specs: r.specs };
        interactables.push(group);
        scene.add(group);
    });
}

// ============ Central Screen ============
let centralScreen;
function createCentralScreen() {
    const group = new THREE.Group();

    // Screen frame
    const frameGeo = new THREE.BoxGeometry(10, 3, 0.2);
    const frameMat = new THREE.MeshStandardMaterial({
        color: 0x111122, metalness: 0.9, roughness: 0.1
    });
    const frame = new THREE.Mesh(frameGeo, frameMat);
    group.add(frame);

    // Screen surface (emissive)
    const screenGeo = new THREE.PlaneGeometry(9.5, 2.8);
    const screenMat = new THREE.MeshBasicMaterial({
        color: 0x001530, transparent: true, opacity: 0.9
    });
    const screen = new THREE.Mesh(screenGeo, screenMat);
    screen.position.z = 0.11;
    group.add(screen);

    // Animated grid on screen
    for (let i = 0; i < 8; i++) {
        const lineGeo = new THREE.PlaneGeometry(9, 0.02);
        const lineMat = new THREE.MeshBasicMaterial({
            color: 0x00d4ff, transparent: true, opacity: 0.3
        });
        const line = new THREE.Mesh(lineGeo, lineMat);
        line.position.set(0, -1.2 + i * 0.35, 0.12);
        group.add(line);
    }

    // Title text
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 512, 128);
    ctx.font = 'bold 36px Microsoft YaHei';
    ctx.fillStyle = '#00d4ff';
    ctx.textAlign = 'center';
    ctx.fillText('多机协同中枢调度系统', 256, 55);
    ctx.font = '20px Microsoft YaHei';
    ctx.fillStyle = 'rgba(0,212,255,0.5)';
    ctx.fillText('MULTI-ROBOT ORCHESTRATION', 256, 90);
    const tex = new THREE.CanvasTexture(canvas);
    const textMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
    const textGeo = new THREE.PlaneGeometry(8, 2);
    const textMesh = new THREE.Mesh(textGeo, textMat);
    textMesh.position.z = 0.13;
    group.add(textMesh);

    // Screen light
    const screenLight = new THREE.PointLight(0x00aaff, 2, 15);
    screenLight.position.z = 1;
    group.add(screenLight);

    group.position.set(0, 5, -15);
    group.userData = {
        name: '中枢调度大屏',
        tag: 'ORCHESTRATION · 多机协同',
        desc: '统一中枢统管所有机器人。实时可视化显示全部机器人的位置、状态、任务。访客可触发协同任务——如模拟洒漏事件，观看M20 Pro发现→中枢派单→云迹UP清理的全自动流程。一台机器人把活派给另一台，全程无人。',

            { label: '交互', value: '访客触发' },
            { label: '面积', value: '30㎡' }
        ]
    };
    interactables.push(group);
    scene.add(group);
}

// ============ Decorative Pixel Wall ============
function createDecorWall() {
    const group = new THREE.Group();
    const cols = 20, rows = 8;
    const tileSize = 0.8;

    for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
            const hue = (x / cols) * 0.3 + 0.15;
            const sat = 0.8;
            const light = 0.1 + Math.random() * 0.3;
            const color = new THREE.Color().setHSL(hue, sat, light);

            const geo = new THREE.BoxGeometry(tileSize * 0.9, tileSize * 0.9, 0.1);
            const mat = new THREE.MeshStandardMaterial({
                color: color, metalness: 0.5, roughness: 0.5,
                emissive: color, emissiveIntensity: light * 0.5
            });
            const tile = new THREE.Mesh(geo, mat);
            tile.position.set(
                (x - cols/2) * tileSize,
                y * tileSize + 1,
                0
            );
            tile.userData.origColor = color.clone();
            tile.userData.pulsePhase = Math.random() * Math.PI * 2;
            group.add(tile);
        }
    }

    group.position.set(-19.5, 0, 0);
    group.rotation.y = Math.PI / 2;
    group.userData = {
        name: '生态矩阵墙',
        tag: 'ECOSYSTEM · 生态展示',
        desc: '动态像素装饰墙，展示黑芝麻智能的泛AI生态系统。每个像素代表一个应用场景——从智能汽车到具身智能，从卫星到农机，从边缘计算到云端推理。芯片赋能千万种形态的应用。',
        specs: [
            { label: '类型', value: '像素矩阵' },
            { label: '动画', value: '动态变色' },
            { label: '主题', value: '泛AI生态' },
            { label: '交互', value: '呼吸效果' }
        ]
    };
    interactables.push(group);
    scene.add(group);
    window.pixelWall = group;
}

// ============ Symbiosis Zone ============
let symbiosisOrb;
function createSymbiosisZone() {
    const group = new THREE.Group();

    // Glowing orb (human-robot symbiosis symbol)
    const orbGeo = new THREE.SphereGeometry(1.5, 32, 32);
    const orbMat = new THREE.MeshBasicMaterial({
        color: 0xff8844, transparent: true, opacity: 0.6
    });
    symbiosisOrb = new THREE.Mesh(orbGeo, orbMat);
    group.add(symbiosisOrb);

    // Outer glow shells
    for (let i = 1; i <= 3; i++) {
        const shellGeo = new THREE.SphereGeometry(1.5 + i * 0.5, 32, 32);
        const shellMat = new THREE.MeshBasicMaterial({
            color: i % 2 === 0 ? 0xff6644 : 0xcc66ff,
            transparent: true, opacity: 0.15 / i
        });
        const shell = new THREE.Mesh(shellGeo, shellMat);
        group.add(shell);
    }

    // Warm point light
    const warmLight = new THREE.PointLight(0xff8844, 2, 12);
    group.add(warmLight);

    group.position.set(14, 4, 8);
    group.userData = {
        name: '人机共生球',
        tag: 'SYMBIOSIS · 共生体验',
        desc: '人机共生沉浸空间的核心装置。暖色光球象征人与机器人的共生关系——当芯片有了身体，未来便有了温度。周围是270°环幕投影，展示2040年人机共生社会的未来场景：智慧城市、危险救援、生态守护。',
        specs: [
            { label: '主题', value: '人机共生' },
            { label: '面积', value: '45㎡' },
            { label: '投影', value: '270°环幕' },
            { label: '情感', value: '温暖+向往' }
        ]
    };
    interactables.push(group);
    scene.add(group);
}

// ============ Lighting ============
function createLighting() {
    // Ambient
    const ambient = new THREE.AmbientLight(0x111133, 0.3);
    scene.add(ambient);

    // Spotlights from ceiling
    const positions = [[-10, -10], [10, -10], [-10, 10], [10, 10], [0, 0]];
    positions.forEach(([x, z]) => {
        const spot = new THREE.SpotLight(0x4488ff, 0.8, 25, Math.PI / 6, 0.5, 1);
        spot.position.set(x, 7.5, z);
        spot.target.position.set(x, 0, z);
        scene.add(spot);
        scene.add(spot.target);
    });
}

// ============ Floor Grid ============
function createFloorGrid() {
    const grid = new THREE.GridHelper(40, 40, 0x004466, 0x001122);
    grid.position.y = 0.02;
    grid.material.opacity = 0.3;
    grid.material.transparent = true;
    scene.add(grid);
}

// ============ Particles ============
let particleSystem;
function createParticles() {
    const count = 500;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);

    for (let i = 0; i < count; i++) {
        const r = Math.random() * 15 + 3;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.cos(phi) * 0.5 + 3;
        positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);

        const c = new THREE.Color();
        c.setHSL(0.55 + Math.random() * 0.1, 0.8, 0.5 + Math.random() * 0.3);
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;

        sizes[i] = Math.random() * 0.15 + 0.05;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const mat = new THREE.PointsMaterial({
        size: 0.15, vertexColors: true,
        transparent: true, opacity: 0.8,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
    });

    particleSystem = new THREE.Points(geo, mat);
    scene.add(particleSystem);
}

// ============ Interaction ============
function onClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const meshes = [];
    interactables.forEach(g => g.traverse(c => { if (c.isMesh) meshes.push(c); }));

    const intersects = raycaster.intersectObjects(meshes);
    if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.name) obj = obj.parent;
        if (obj && obj.userData.name) {
            showInfo(obj.userData);
        }
    }
}

function showInfo(data) {
    document.getElementById('info-title').textContent = data.name;
    document.getElementById('info-tag').textContent = data.tag;
    document.getElementById('info-desc').textContent = data.desc;
    const specsHtml = data.specs.map(s =>
        `<div class="spec"><div class="spec-label">${s.label}</div><div class="spec-value">${s.value}</div></div>`
    ).join('');
    document.getElementById('info-specs').innerHTML = specsHtml;
    document.getElementById('info-panel').classList.add('show');
}

function closePanel() {
    document.getElementById('info-panel').classList.remove('show');
}

// ============ Keyboard ============
function onKeyDown(e) {
    switch(e.code) {
        case 'KeyW': case 'ArrowUp': moveForward = true; break;
        case 'KeyS': case 'ArrowDown': moveBackward = true; break;
        case 'KeyA': case 'ArrowLeft': moveLeft = true; break;
        case 'KeyD': case 'ArrowRight': moveRight = true; break;
        case 'Escape': closePanel(); break;
    }
}
function onKeyUp(e) {
    switch(e.code) {
        case 'KeyW': case 'ArrowUp': moveForward = false; break;
        case 'KeyS': case 'ArrowDown': moveBackward = false; break;
        case 'KeyA': case 'ArrowLeft': moveLeft = false; break;
        case 'KeyD': case 'ArrowRight': moveRight = false; break;
    }
}

// ============ Animation Loop ============
let frame = 0;
function animate() {
    requestAnimationFrame(animate);
    frame++;
    const t = clock.getElapsedTime();

    // Rotate hex core
    if (hexCore) {
        hexCore.rotation.y += 0.005;
        hexCoreLight.intensity = 2.5 + Math.sin(t * 2) * 1;
    }
    // Rotate rings
    scene.children.forEach(child => {
        if (child.userData.rotSpeed) {
            child.rotation.z += child.userData.rotSpeed * 0.01;
        }
    });

    // Pixel wall pulse
    if (window.pixelWall) {
        window.pixelWall.children.forEach((tile, i) => {
            if (tile.userData.pulsePhase !== undefined) {
                const pulse = Math.sin(t * 2 + tile.userData.pulsePhase) * 0.5 + 0.5;
                tile.material.emissiveIntensity = 0.1 + pulse * 0.4;
            }
        });
    }

    // Symbiosis orb pulse
    if (symbiosisOrb) {
        const scale = 1 + Math.sin(t * 1.5) * 0.1;
        symbiosisOrb.scale.set(scale, scale, scale);
        symbiosisOrb.material.opacity = 0.4 + Math.sin(t * 1.5) * 0.2;
    }

    // Particles rotate
    if (particleSystem) {
        particleSystem.rotation.y += 0.0005;
        const positions = particleSystem.geometry.attributes.position.array;
        for (let i = 0; i < positions.length; i += 3) {
            positions[i + 1] += Math.sin(t + i) * 0.002;
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
    }

    // Walk mode movement
    if (walkMode && pointerControls.isLocked) {
        velocity.x -= velocity.x * 10.0 * 0.016;
        velocity.z -= velocity.z * 10.0 * 0.016;
        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();
        if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * 0.016;
        if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * 0.016;
        pointerControls.moveRight(-velocity.x * 0.016);
        pointerControls.moveForward(-velocity.z * 0.016);
    }

    // Orbit controls
    if (mode === 'orbit') orbitControls.update();

    renderer.render(scene, camera);
}

// ============ Resize ============
function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============ Mode Toggle Buttons ============
document.getElementById('btn-orbit').addEventListener('click', () => { walkMode = false; setMode('orbit'); });
document.getElementById('btn-walk').addEventListener('click', () => { walkMode = true; setMode('walk'); });

// ============ Start ============
init();
</script>
