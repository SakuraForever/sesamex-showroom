<!DOCTYPE html><html><head><meta charset="UTF-8"><title>LED屏2 · 芯片世界树光柱（六面展开）</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;font-family:'Microsoft YaHei',sans-serif}canvas{display:block}</style>
</head><body><canvas id="c"></canvas><script>
// Pause when not visible (performance)
var _raf=requestAnimationFrame;
var _paused=false;
document.addEventListener('visibilitychange',function(){_paused=document.hidden});
window.requestAnimationFrame=function(cb){if(_paused)return setTimeout(function(){requestAnimationFrame(cb)},100);return _raf(cb)};

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=1920,H=1080;cv.width=W;cv.height=H;
let t=0;const FPS=30,TOTAL=60,FRAMES=TOTAL*FPS;
const FW=W/6;
let particles=[];
for(let i=0;i<120;i++)particles.push({f:Math.floor(Math.random()*6),y:Math.random()*H,sp:0.5+Math.random()*3,sz:1+Math.random()*3,c:['#00D4FF','#00FF99','#FF9944','#6644FF','#00CCFF','#FF6699'][i%6]});
const labels=['HUMANOID','QUADRUPED','COFFEE','DELIVERY','CLEANER','ARM'];
const platLabels=['SesameX Kalos','SesameX Aura','SesameX Liora'];
function draw(){
ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,0,W,H);
const sec=t/FPS;const ph=sec<15?0:sec<40?1:sec<50?2:3;const lt=sec%TOTAL;
// 6-face separators
ctx.strokeStyle='rgba(0,212,255,0.08)';ctx.lineWidth=1;
for(let i=1;i<6;i++){ctx.beginPath();ctx.moveTo(i*FW,0);ctx.lineTo(i*FW,H);ctx.stroke();}
// Face labels (bottom)
ctx.font='10px Microsoft YaHei';ctx.textAlign='center';ctx.fillStyle='rgba(0,212,255,0.2)';
for(let i=0;i<6;i++)ctx.fillText('FACE '+(i+1),i*FW+FW/2,H-10);

if(ph===0){
// Phase 1: Chip awakening (synchronized across 6 faces)
const grow=Math.min(lt/3,1);
for(let f=0;f<6;f++){
const fx=f*FW;
ctx.fillStyle='rgba(0,212,255,'+(0.8+Math.sin(t*0.2+f)*0.2)+')';
ctx.fillRect(fx+FW/2-15,H-grow*H*0.4,30,20);}
if(lt>3){
for(let f=0;f<6;f++){
const fx=f*FW;ctx.save();ctx.translate(fx+FW/2,H/2);ctx.rotate(t*0.05+f*0.3);
ctx.strokeStyle='rgba(0,212,255,'+(0.4)+')';ctx.lineWidth=2;
ctx.strokeRect(-40,-40,80,80);ctx.strokeRect(-25,-25,50,50);ctx.restore();}
// Labels on faces 2 and 5
ctx.font='14px Microsoft YaHei';ctx.textAlign='center';
ctx.fillStyle='rgba(0,212,255,0.6)';ctx.fillText('A2000',1*FW+FW/2,H/2+60);
ctx.fillStyle='rgba(0,212,255,0.6)';ctx.fillText('256 TOPS',4*FW+FW/2,H/2+60);}
if(lt>8){
particles.forEach(p=>{p.y-=p.sp*2;if(p.y<0)p.y=H;
ctx.fillStyle=p.c;ctx.globalAlpha=0.4;
ctx.beginPath();ctx.arc(p.f*FW+FW/2,p.y,p.sz,0,7);ctx.fill();});
ctx.globalAlpha=1;}
}else if(ph===1){
// Phase 2: Form evolution (each face shows different robot form)
for(let f=0;f<6;f++){
const fx=f*FW;const cx=fx+FW/2;const cy=H/2;
// Draw geometric robot silhouette per face
ctx.strokeStyle=['#00FF99','#00CCFF','#FF9944','#4488FF','#AA66FF','#FFCC00'][f];
ctx.lineWidth=2;ctx.globalAlpha=0.7;
if(f===0){// Humanoid
ctx.strokeRect(cx-15,cy-40,30,60);ctx.beginPath();ctx.arc(cx,cy-55,12,0,7);ctx.stroke();
ctx.beginPath();ctx.moveTo(cx-15,cy-30);ctx.lineTo(cx-30,cy-10);ctx.moveTo(cx+15,cy-30);ctx.lineTo(cx+30,cy-10);ctx.stroke();}
else if(f===1){// Quadruped
ctx.beginPath();ctx.moveTo(cx-30,cy);ctx.lineTo(cx+30,cy);
ctx.moveTo(cx-20,cy);ctx.lineTo(cx-25,cy+25);ctx.moveTo(cx-10,cy);ctx.lineTo(cx-5,cy+25);
ctx.moveTo(cx+10,cy);ctx.lineTo(cx+15,cy+25);ctx.moveTo(cx+20,cy);ctx.lineTo(cx+25,cy+25);ctx.stroke();}
else if(f===2){// Coffee
ctx.strokeRect(cx-20,cy-25,40,50);ctx.beginPath();ctx.arc(cx,cy-30,15,0,7);ctx.stroke();}
else if(f===3){// Delivery box
ctx.strokeRect(cx-25,cy-30,50,60);ctx.strokeRect(cx-15,cy-20,30,20);}
else if(f===4){// Cleaner disc
ctx.beginPath();ctx.ellipse(cx,cy+20,35,15,0,0,7);ctx.stroke();
ctx.beginPath();ctx.moveTo(cx-35,cy+20);ctx.lineTo(cx-45,cy+35);ctx.stroke();}
else if(f===5){// Arm
ctx.beginPath();ctx.moveTo(cx,cy+40);ctx.lineTo(cx,cy);
ctx.lineTo(cx+25,cy-15);ctx.lineTo(cx+35,cy-30);ctx.stroke();
ctx.beginPath();ctx.arc(cx+35,cy-35,8,0,7);ctx.stroke();}
ctx.globalAlpha=1;
// Label
ctx.font='12px Microsoft YaHei';ctx.textAlign='center';
ctx.fillStyle=['#00FF99','#00CCFF','#FF9944','#4488FF','#AA66FF','#FFCC00'][f];
ctx.fillText(labels[f],cx,cy+80);
ctx.font='9px monospace';ctx.fillStyle='rgba(0,255,153,0.5)';ctx.fillText('SesameX Inside',fx+FW-50,20);}
// Platform label rotating
const pi=Math.floor(sec*2)%3;
ctx.font='14px Microsoft YaHei';ctx.textAlign='center';
ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillText(platLabels[pi],W/2,H-40);
// Particles flowing up all faces
particles.forEach(p=>{p.y-=p.sp*3;if(p.y<0)p.y=H;
ctx.fillStyle=p.c;ctx.globalAlpha=0.2;
ctx.beginPath();ctx.arc(p.f*FW+Math.sin(t*0.05+p.y)*20,p.y,p.sz,0,7);ctx.fill();});
ctx.globalAlpha=1;
}else if(ph===2){
// Phase 3: Data stream (all faces show data flow up)
ctx.font='bold 18px monospace';ctx.textAlign='center';
const lines=['256 TOPS','<5ms LATENCY','MAX EFFICIENCY','LLM/VLA/WORLD MODEL'];
for(let f=0;f<6;f++){
const fx=f*FW;
lines.forEach((l,i)=>{
const y=H-100+i*60;const offset=Math.sin(t*0.1+i+f)*8;
ctx.fillStyle='rgba(0,212,255,'+(0.4+Math.sin(t*0.05+i)*0.2)+')';
ctx.fillText(l,fx+FW/2,y+offset);});}
for(let i=0;i<60;i++){const fi=i%6;const x=fi*FW+FW/2+(i%3-1)*20;
const y=H-((t*4+i*30)%H);
ctx.fillStyle='rgba(0,212,255,0.3)';ctx.fillRect(x,y,2,5);}
}else{
// Phase 4: Brand breathing (all faces unified)
const pulse=0.4+Math.sin(t*0.1)*0.4;
for(let f=0;f<6;f++){
const fx=f*FW;
ctx.fillStyle='rgba(0,212,255,'+pulse*0.15+')';ctx.fillRect(fx,0,FW,H);}
ctx.font='bold 24px Microsoft YaHei';ctx.textAlign='center';
ctx.fillStyle='rgba(255,255,255,'+pulse+')';ctx.fillText('BLACK SESAME',W/2,H/2);}
// Core glow
ctx.fillStyle='rgba(0,212,255,'+(0.3+Math.sin(t*0.15)*0.2)+')';
ctx.beginPath();ctx.arc(W/2,H-30,15,0,7);ctx.fill();
t++;if(t>=FRAMES)t=0;requestAnimationFrame(draw);}draw();
</script></body></html>
