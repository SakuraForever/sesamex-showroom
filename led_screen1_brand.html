<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>LED屏1 · 入口品牌墙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,'SF Pro Display','Microsoft YaHei','PingFang SC',sans-serif}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Pause when not visible (performance)
var _raf=requestAnimationFrame;
var _paused=false;
document.addEventListener('visibilitychange',function(){_paused=document.hidden});
window.requestAnimationFrame=function(cb){if(_paused)return setTimeout(function(){requestAnimationFrame(cb)},100);return _raf(cb)};

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=1920,H=400;cv.width=W;cv.height=H;
let t=0,particles=[],phase=0;
const TOTAL=120,FPS=30,TOTAL_FRAMES=TOTAL*FPS;

for(let i=0;i<200;i++){
  particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,r:Math.random()*3+1,life:Math.random()});
}

function draw(){
  ctx.fillStyle='rgba(0,5,16,0.15)';ctx.fillRect(0,0,W,H);
  const sec=t/FPS;
  
  // Phase logic
  if(sec<30)phase=0;else if(sec<60)phase=1;else if(sec<90)phase=2;else phase=3;
  const localT=(sec%30)/30;
  
  // Draw particles
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
  });
  
  if(phase===0){
    // Scene A: Brand slogan
    if(localT<0.1){
      // Particles converge
      const cx=W/2,cy=H/2;
      particles.forEach(p=>{
        const dx=cx-p.x,dy=cy-p.y;p.x+=dx*0.05;p.y+=dy*0.05;
        ctx.fillStyle='rgba(0,212,255,'+(0.3+localT*5)+')';
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();
      });
    }else if(localT<0.5){
      // Logo appears
      ctx.fillStyle='rgba(0,212,255,'+(0.5+Math.sin(t*0.1)*0.3)+')';
      ctx.beginPath();ctx.arc(W/2,H/2-40,30,0,7);ctx.fill();
      // Text
      if(localT>0.15){
        const a=Math.min((localT-0.15)*5,1);
        ctx.font='bold 48px Microsoft YaHei';ctx.textAlign='center';
        const grad=ctx.createLinearGradient(0,0,W,0);
        grad.addColorStop(0,'rgba(0,212,255,'+a+')');
        grad.addColorStop(1,'rgba(102,68,255,'+a+')');
        ctx.fillStyle=grad;
        ctx.fillText('黑芝麻智能科技',W/2,H/2+30);
        ctx.font='24px Microsoft YaHei';ctx.fillStyle='rgba(255,255,255,'+a*0.6+')';
        ctx.fillText('BLACK SESAME TECHNOLOGIES',W/2,H/2+70);
      }
    }else if(localT<0.83){
      // Slogan
      const chars='一颗芯片 赋能千万种形态';
      const showCount=Math.floor((localT-0.5)/0.3*chars.length);
      ctx.font='bold 56px Microsoft YaHei';ctx.textAlign='center';
      const grad=ctx.createLinearGradient(0,0,W,0);
      grad.addColorStop(0,'#00D4FF');grad.addColorStop(1,'#6644FF');
      ctx.fillStyle=grad;
      ctx.fillText(chars.substring(0,showCount),W/2,H/2+20);
      if(localT>0.75){
        ctx.font='22px Microsoft YaHei';ctx.fillStyle='rgba(255,255,255,0.4)';
        ctx.fillText('A Chip, Endless Forms',W/2,H/2+60);
      }
    }else{
      // Fade out
      const a=1-(localT-0.83)*6;
      particles.forEach(p=>{
        p.vx*=1.05;p.vy*=1.05;
        ctx.fillStyle='rgba(0,212,255,'+a*0.3+')';
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();
      });
    }
  }else if(phase===1){
    // Scene B: Enterprise positioning
    ctx.strokeStyle='rgba(0,80,150,0.15)';ctx.lineWidth=1;
    for(let i=0;i<20;i++){
      ctx.beginPath();ctx.moveTo(0,i*20+sec*10%H);ctx.lineTo(W,i*20+sec*10%H);ctx.stroke();
    }
    if(localT>0.15){
      const a=Math.min((localT-0.15)*4,1);
      ctx.font='bold 52px Microsoft YaHei';ctx.textAlign='center';
      ctx.fillStyle='rgba(255,255,255,'+a+')';
      ctx.fillText('端侧AI推理芯片全球领导者',W/2,H/2);
      ctx.font='24px Microsoft YaHei';ctx.fillStyle='rgba(0,212,255,'+a*0.7+')';
      ctx.fillText('Global Leader in Edge AI Inference',W/2,H/2+45);
    }
    if(localT>0.5){
      const icons=['AUTO','HUMANOID','SAT','SHIP','FARM'];
      icons.forEach((ic,i)=>{
        const x=W/2-200+i*100;
        const a=Math.min((localT-0.5-i*0.05)*8,1);
        ctx.font='48px sans-serif';ctx.textAlign='center';
        ctx.globalAlpha=a;
        ctx.fillText(ic,x,H/2+100);
      });
      ctx.globalAlpha=1;
    }
  }else if(phase===2){
    // Scene C: World tree preview
    // Chip growing into tree
    const chipY=H/2+60-localT*120;
    ctx.fillStyle='rgba(0,212,255,'+(0.5+Math.sin(t*0.15)*0.3)+')';
    ctx.fillRect(W/2-15,chipY-10,30,20);
    // Light beam
    if(localT>0.2){
      const beamH=localT*200;
      const grad=ctx.createLinearGradient(0,H/2-beamH,0,H/2);
      grad.addColorStop(0,'rgba(255,136,68,0.01)');
      grad.addColorStop(0.5,'rgba(0,212,255,0.3)');
      grad.addColorStop(1,'rgba(102,68,255,0.4)');
      ctx.fillStyle=grad;
      ctx.fillRect(W/2-8,H/2-beamH,16,beamH);
    }
    // Robot silhouettes
    if(localT>0.4){
      ctx.font='36px sans-serif';ctx.textAlign='center';
      const forms=['HUMANOID','QUADRUPED','COFFEE','DELIVERY','CLEANER','ARM'];
      forms.forEach((f,i)=>{
        const ang=i/6*Math.PI*2+sec*0.5;
        const x=W/2+Math.cos(ang)*150;
        const y=H/2-50+Math.sin(ang)*60;
        ctx.globalAlpha=Math.min((localT-0.4)*3,0.8);
        ctx.fillText(f,x,y);
      });
      ctx.globalAlpha=1;
    }
    if(localT>0.6){
      const a=Math.min((localT-0.6)*4,1);
      ctx.font='bold 36px Microsoft YaHei';ctx.textAlign='center';
      ctx.fillStyle='rgba(255,255,255,'+a+')';
      ctx.fillText('芯片世界树 从现在到未来的人机共生',W/2,H-40);
    }
  }else{
    // Scene D: BEST TECH BEST LIFE
    if(localT<0.15){
      // Particle waterfall
      ctx.fillStyle='rgba(255,215,0,0.3)';
      for(let i=0;i<30;i++){
        const x=Math.random()*W,y=(sec*200+i*50)%H;
        ctx.fillRect(x,y,3,8);
      }
    }else if(localT<0.5){
      const a=Math.min((localT-0.15)*4,1);
      ctx.font='bold 80px Microsoft YaHei';ctx.textAlign='center';
      const grad=ctx.createLinearGradient(0,0,W,0);
      grad.addColorStop(0,'rgba(255,215,0,'+a+')');
      grad.addColorStop(1,'rgba(255,136,68,'+a+')');
      ctx.fillStyle=grad;
      ctx.fillText('BEST TECH',W/2,H/2-20);
      ctx.fillText('BEST LIFE',W/2,H/2+60);
    }else if(localT<0.83){
      ctx.font='bold 80px Microsoft YaHei';ctx.textAlign='center';
      ctx.fillStyle='rgba(255,215,0,0.9)';
      ctx.fillText('BEST TECH',W/2,H/2-20);
      ctx.fillText('BEST LIFE',W/2,H/2+60);
      const a=Math.min((localT-0.5)*4,1);
      ctx.font='24px Microsoft YaHei';ctx.fillStyle='rgba(255,255,255,'+a*0.6+')';
      ctx.fillText('LABEL',W/2,H-30);
    }else{
      const a=1-(localT-0.83)*6;
      ctx.globalAlpha=a;
      ctx.font='bold 80px Microsoft YaHei';ctx.textAlign='center';
      ctx.fillStyle='#FFD700';
      ctx.fillText('BEST TECH',W/2,H/2-20);
      ctx.fillText('BEST LIFE',W/2,H/2+60);
      ctx.globalAlpha=1;
    }
  }
  
  // Particles ambient
  particles.forEach(p=>{
    if(phase!==0){
      ctx.fillStyle='rgba(0,150,255,0.1)';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*0.5,0,7);ctx.fill();
    }
  });
  
  t++;
  if(t>=TOTAL_FRAMES)t=0;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
