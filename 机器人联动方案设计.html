<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>机器人联动方案设计</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-dark.css">
<style>body{background:#0d1117;color:#c9d1d9;padding:40px;max-width:900px;margin:0 auto;font-family:-apple-system,sans-serif;line-height:1.8}
table{border-collapse:collapse;width:100%}td,th{border:1px solid #30363d;padding:8px 12px}
th{background:#161b22}tr:nth-child(even){background:#161b22}
code{background:#1c2128;padding:2px 6px;border-radius:4px}
pre{background:#161b22;padding:16px;border-radius:8px;overflow-x:auto}
blockquote{border-left:3px solid #0a84ff;padding-left:16px;color:#8b949e}
</style></head><body class="markdown-body"><div id="content"></div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
fetch('../docs/机器人联动方案设计.md').then(r=>r.text()).then(md=>{
document.getElementById('content').innerHTML=marked.parse(md);
mermaid.initialize({startOnLoad:true,theme:'dark'});
mermaid.run();
})
</script>
</body></html>
